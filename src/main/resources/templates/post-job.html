<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job — Job Portal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{nav-fragment :: nav}"></div>

  <!-- HERO BAND -->
  <div class="page-hero">
    <h1>Post a New Job</h1>
    <p>Reach thousands of qualified candidates instantly</p>
  </div>

  <!-- BODY -->
  <div class="page-body">
    <div style="max-width:620px;margin:0 auto;">
      <div class="card">

        <h2 style="font-size:1.15rem;font-weight:700;color:var(--slate-900);margin-bottom:24px;">Job Details</h2>

        <form action="/save-job" method="post">

          <div class="form-group">
            <label for="title">Job Title <span style="color:var(--red)">*</span></label>
            <input type="text" id="title" name="title" placeholder="e.g. Senior Frontend Engineer" required>
          </div>

          <div class="form-group">
            <label for="company">Company Name <span style="color:var(--red)">*</span></label>
            <input type="text" id="company" name="company" placeholder="e.g. Acme Corp" required>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label for="location">Location <span style="color:var(--red)">*</span></label>
              <input type="text" id="location" name="location" placeholder="e.g. Hyderabad / Remote" required>
            </div>
            <div class="form-group">
              <label for="salary">Salary / CTC</label>
              <input type="text" id="salary" name="salary" placeholder="e.g. ₹12–18 LPA">
            </div>
          </div>

          <div class="form-group">
            <label for="description">Job Description <span style="color:var(--red)">*</span></label>
            <textarea id="description" name="description" rows="6"
              placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
          </div>

          <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" class="btn btn-primary" style="flex:1;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M5 13l4 4L19 7"/></svg>
              Publish Job
            </button>
            <a href="/jobs-page" class="btn btn-outline">Cancel</a>
          </div>

        </form>

      </div>
    </div>
  </div>

</body>
</html>
