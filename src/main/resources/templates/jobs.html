<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs — Job Portal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <div th:replace="~{nav-fragment :: nav}"></div>

  <!-- HERO BAND -->
  <div class="page-hero">
    <h1>Available Jobs</h1>
    <p>Find the role that's right for you and apply in one click</p>
  </div>

  <!-- BODY -->
  <div class="page-body">

    <!-- applied success banner -->
    <div class="alert alert-success" th:if="${param.applied}">
      ✅ Application submitted successfully! View it under <a href="/my-applications" style="color:#065f46;font-weight:700;">My Applications</a>.
    </div>

    <!-- toolbar -->
    <div class="toolbar">
      <div>
        <h2>Open Positions</h2>
        <p th:text="${jobs.size()} + ' jobs listed'"></p>
      </div>
      <a href="/post-job" class="btn btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
        Post a Job
      </a>
    </div>

    <!-- empty state -->
    <div class="empty-state" th:if="${jobs.isEmpty()}">
      <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
      <h3>No jobs posted yet</h3>
      <p>Be the first to post an opening!</p>
      <a href="/post-job" class="btn btn-primary" style="margin-top:18px;">Post a Job</a>
    </div>

    <!-- job grid -->
    <div class="jobs-grid" th:if="${!jobs.isEmpty()}">

      <div class="job-card" th:each="job : ${jobs}">

        <div class="job-card-header">
          <h2 th:text="${job.title}">Job Title</h2>
          <span class="job-badge">Full-time</span>
        </div>

        <div class="job-meta">
          <span class="job-meta-item">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21l1.9-5.7A8.5 8.5 0 1 1 21 12"/></svg>
            <span th:text="${job.company}">Company</span>
          </span>
          <span class="job-meta-item">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"/><path stroke-linecap="round" d="M12 9v4l3 3"/></svg>
            <span th:text="${job.location}">Location</span>
          </span>
          <span class="job-meta-item">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>
            <span th:text="${job.salary}">Salary</span>
          </span>
        </div>

        <p class="job-description" th:text="${job.description}">Description</p>

        <div class="job-card-footer">
          <!-- single, clean apply form (bug-fix: removed duplicate nested form) -->
          <form th:action="@{/apply-job}" method="post">
            <input type="hidden" name="jobId" th:value="${job.id}">
            <button type="submit" class="btn btn-success btn-full">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M5 13l4 4L19 7"/></svg>
              Apply Now
            </button>
          </form>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
